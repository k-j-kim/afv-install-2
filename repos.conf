# repos.conf — central config for sfdx-local-test-install.sh
# Format: "owner/repo@branch"

# Local VSIX to install up-front (step 1)
LOCAL_VSIX="/Users/kj.kim/Desktop/LATEST VSIX/salesforcedx-einstein-gpt-3.37.0.vsix"

# The propagation chain. Order matters: each repo links into the next.
WEBAPPS_REPO="salesforce-experience-platform-emu/webapps@main"
TEMPLATES_REPO="forcedotcom/salesforcedx-templates@main"
PLUGIN_TEMPLATES_REPO="salesforcecli/plugin-templates@main"
VSCODE_REPO="forcedotcom/salesforcedx-vscode@develop"

# Skills source — a PR ref (head SHA or branch). Use the PR's head branch.
SKILLS_PR_REPO="salesforce-internal/sf-skills-internal"
SKILLS_PR_NUMBER="157"
# The PR's `skills/` subdir is what we copy into Einstein-GPT's Skills-Salesforce/.
SKILLS_SUBDIR="skills"

# Sample apps PR — used by step 8 to override what the AFV extension clones
# when a user clicks a sample-app card. The extension is hard-coded to clone
# https://github.com/forcedotcom/afv-library; step 8 overrides that URL via
# git's `insteadOf` rewrite so it pulls from a local repo seeded with the PR's
# updated sample directories.
SAMPLE_APPS_PR_REPO="salesforce-internal/sf-skills-internal"
SAMPLE_APPS_PR_NUMBER="289"
# Sample dirs to splice from the PR into the afv-library clone (basename in
# both repos' `samples/`).
SAMPLE_APPS_DIRS=(
  "ui-bundle-template-app-react-sample-b2e"
  "ui-bundle-template-app-react-sample-b2x"
)
# The URL the extension hard-codes — must match exactly for insteadOf to bite.
AFV_LIBRARY_URL="https://github.com/forcedotcom/afv-library"

# gh accounts — script will `gh auth switch` automatically based on the owner.
# Edit if your account names differ.
GH_ACCOUNT_PUBLIC="k-j-kim"
GH_ACCOUNT_INTERNAL="kj-kim_sfemu"

# Owners that require the internal account.
INTERNAL_OWNERS=("salesforce-experience-platform-emu" "salesforce-internal")
